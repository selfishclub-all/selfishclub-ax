<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
.banner {
  width:1346px; height:734px;
  background: #000;
  position:relative; overflow:hidden;
  font-family:'Noto Sans KR',sans-serif; color:#fff;
}
/* 대각선 그라디언트 블록 */
.bg-block {
  position:absolute; top:-100px; right:-200px;
  width:900px; height:1000px;
  background: linear-gradient(135deg, #6C5CE7 0%, #A29BFE 100%);
  transform: rotate(-12deg);
  border-radius: 60px;
}
.bg-block-2 {
  position:absolute; bottom:-300px; right:-100px;
  width:600px; height:600px;
  background: linear-gradient(135deg, #00B894 0%, #55EFC4 100%);
  transform: rotate(-12deg);
  border-radius: 40px;
  opacity: 0.7;
}
/* 노이즈 텍스처 */
.noise {
  position:absolute; inset:0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.5;
}
.content {
  position:relative; z-index:2;
  padding: 80px 80px 60px;
  height:100%; display:flex; flex-direction:column; justify-content:space-between;
}
.top-section {}
.label {
  display:inline-block; padding:8px 20px; border-radius:6px;
  background: rgba(255,255,255,0.1); backdrop-filter:blur(10px);
  font-size:14px; font-weight:700; color:rgba(255,255,255,0.7);
  letter-spacing:2px; margin-bottom:32px;
}
.headline {
  font-size:72px; font-weight:900; line-height:1.15;
  margin-bottom:24px; max-width:700px;
}
.headline .highlight {
  background: linear-gradient(135deg, #6C5CE7, #A29BFE);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.desc {
  font-size:22px; font-weight:500; color:rgba(255,255,255,0.6);
  line-height:1.6; max-width:550px;
}
.bottom-section {
  display:flex; align-items:flex-end; justify-content:space-between;
}
.benefits {
  display:flex; gap:12px;
}
.benefit {
  padding:10px 20px; border-radius:24px;
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1);
  font-size:15px; font-weight:600; color:rgba(255,255,255,0.8);
}
.cta-btn {
  padding:18px 48px; border-radius:32px;
  background:#fff; color:#000;
  font-size:20px; font-weight:900;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
</style></head><body>
<div class="banner">
  <div class="bg-block"></div>
  <div class="bg-block-2"></div>
  <div class="noise"></div>
  <div class="content">
    <div class="top-section">
      <div class="label">SELFISH CLUB</div>
      <div class="headline">
        개발자 없이<br>
        <span class="highlight">내 서비스</span><br>
        직접 만드는 법
      </div>
      <div class="desc">
        코딩 몰라도 됩니다. AI 하나로 기획부터 런칭까지,<br>
        진짜 돌아가는 서비스를 만들어보는 실전 가이드.
      </div>
    </div>
    <div class="bottom-section">
      <div class="benefits">
        <div class="benefit">🎬 VOD 무제한 복습</div>
        <div class="benefit">📦 실전 플러그인 제공</div>
        <div class="benefit">📝 AI 인사이트 노트</div>
      </div>
      <div class="cta-btn">자세히 보기 ›</div>
    </div>
  </div>
</div>
</body></html>
