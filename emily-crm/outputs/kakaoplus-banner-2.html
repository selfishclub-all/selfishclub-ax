<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
.banner {
  width:1346px; height:734px;
  background: linear-gradient(160deg, #0B1426 0%, #0F1B33 35%, #162044 65%, #0B1426 100%);
  position:relative; overflow:hidden;
  font-family:'Noto Sans KR',sans-serif; color:#fff;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.banner::before {
  content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:600px; height:600px; border-radius:50%;
  background: radial-gradient(circle, rgba(79,195,247,0.08) 0%, transparent 65%);
}
.deco-line {
  position:absolute; top:0; left:0; right:0; height:4px;
  background: linear-gradient(90deg, transparent, #4FC3F7, #FFD84D, transparent);
}
.content { position:relative; z-index:1; text-align:center; padding:0 80px; }
.count-badge {
  display:inline-block; padding:10px 28px; border-radius:24px;
  background: linear-gradient(135deg, rgba(255,216,77,0.15), rgba(255,216,77,0.05));
  border:1px solid rgba(255,216,77,0.3);
  font-size:16px; font-weight:700; color:#FFD84D;
  margin-bottom:28px;
}
.count-badge .num { font-size:22px; font-weight:900; }
.main {
  font-size:54px; font-weight:900; line-height:1.3; margin-bottom:16px;
}
.main .accent { color:#4FC3F7; }
.sub-text {
  font-size:22px; font-weight:500; color:rgba(255,255,255,0.55); margin-bottom:14px;
}
.program-name {
  font-size:18px; font-weight:400; color:rgba(255,255,255,0.4); margin-bottom:36px;
  padding:10px 24px; border-radius:8px; background:rgba(255,255,255,0.04);
  display:inline-block;
}
.benefits {
  display:flex; gap:16px; justify-content:center; margin-bottom:32px;
}
.benefit-chip {
  padding:8px 16px; border-radius:16px;
  background:rgba(79,195,247,0.08); border:1px solid rgba(79,195,247,0.15);
  font-size:14px; color:rgba(255,255,255,0.7);
}
.cta-btn {
  display:inline-block; padding:16px 48px; border-radius:30px;
  background: linear-gradient(135deg, #FFD84D, #FFC107);
  color:#0B1426; font-size:20px; font-weight:800;
  box-shadow: 0 4px 24px rgba(255,216,77,0.25);
}
.bottom-bar {
  position:absolute; bottom:0; left:0; right:0; height:44px;
  background:rgba(0,0,0,0.3); display:flex; align-items:center; justify-content:center;
  font-size:12px; color:rgba(255,255,255,0.2); letter-spacing:1px;
}
.urgency {
  position:absolute; top:24px; right:32px;
  padding:8px 16px; border-radius:8px;
  background:rgba(255,59,48,0.15); border:1px solid rgba(255,59,48,0.3);
  font-size:13px; font-weight:700; color:#FF6B6B;
}
</style></head><body>
<div class="banner">
  <div class="deco-line"></div>
  <div class="urgency">⏰ 마감 임박</div>
  <div class="content">
    <div class="count-badge">🔥 벌써 <span class="num">100</span>명 넘게 신청했어요</div>
    <div class="main">
      아직 안 들어봤으면<br>
      <span class="accent">이번이 기회</span>에요
    </div>
    <div class="sub-text">비개발자도 바로 따라할 수 있는 실전 가이드</div>
    <div class="program-name">클로드코드앱 & 깃헙 실전 정복기</div>
    <div class="benefits">
      <div class="benefit-chip">🎁 VOD 제공</div>
      <div class="benefit-chip">📦 플러그인 모음</div>
      <div class="benefit-chip">📝 AI 인사이트 노트</div>
    </div>
    <div class="cta-btn">마감 전 신청하기 ›</div>
  </div>
  <div class="bottom-bar">SELFISH CLUB — 이기적멤버십</div>
</div>
</body></html>
