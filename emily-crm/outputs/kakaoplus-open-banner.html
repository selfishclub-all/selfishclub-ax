<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카플친 배너 — 오픈 Phase</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f5; padding: 20px; }
  h2 { margin-bottom: 8px; }
  .info { color: #666; margin-bottom: 16px; font-size: 14px; }
  canvas { display: block; width: 100%; max-width: 900px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 16px; }
  .btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .btns button { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 14px; }
  .btn-edit { border: 1px solid #ddd; background: #fff; }
  .btn-png { border: none; background: #00E5A0; color: #111; font-weight: 700; }
  .btn-jpg { border: 1px solid #ddd; background: #fff; }
  .btn-reset { border: 1px solid #ddd; background: #fff; color: #999; }
  .editor { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; background: #f9f9f9; border-radius: 8px; margin-bottom: 16px; }
  .editor label { display: flex; flex-direction: column; gap: 4px; }
  .editor span { font-size: 13px; font-weight: 600; color: #555; }
  .editor input { padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; font-family: inherit; }
  .hidden { display: none; }
</style>
</head>
<body>

<h2>📢 카플친 배너 — 오픈 Phase</h2>
<p class="info">Layout A (중앙 타이포) · P4 (다크 & 네온그린) · 1346×734</p>

<canvas id="banner"></canvas>

<div class="btns">
  <button class="btn-edit" onclick="toggleEdit()">✏️ 편집 열기</button>
  <button class="btn-png" onclick="download('png')">📥 PNG 다운로드</button>
  <button class="btn-jpg" onclick="download('jpg')">📥 JPG 다운로드</button>
  <button class="btn-reset" onclick="resetAll()">🔄 초기화</button>
</div>

<div id="editor" class="editor hidden">
  <label><span>뱃지</span><input id="f_badge" oninput="render()"></label>
  <label><span>라벨</span><input id="f_label" oninput="render()"></label>
  <label><span>메인 1줄</span><input id="f_main1" oninput="render()"></label>
  <label><span>메인 2줄</span><input id="f_main2" oninput="render()"></label>
  <label><span>강조 단어</span><input id="f_highlight" oninput="render()"></label>
  <label><span>서브카피</span><input id="f_sub" oninput="render()"></label>
  <label><span>일시</span><input id="f_date" oninput="render()"></label>
  <label><span>CTA 버튼</span><input id="f_cta" oninput="render()"></label>
</div>

<script>
const W = 1346, H = 734, SC = 2;
const DEFAULTS = {
  badge: '신청 오픈 🔔',
  label: '이기적공유회',
  main1: '코딩 없이',
  main2: '내 서비스 만든다',
  highlight: '내 서비스',
  sub: '클로드코드 앱 하나로 시작하는 실전 가이드',
  date: '4/13(월) 저녁 8시 ZOOM',
  cta: '지금 신청하기 ›'
};

const C = {
  bgTop: '#111111', bgBottom: '#1A1A2E',
  accent: '#00E5A0', gold: '#FFD84D',
  white: '#FFFFFF', dim: 'rgba(255,255,255,0.6)',
  badgeBg: 'rgba(0,229,160,0.12)', badgeBorder: 'rgba(0,229,160,0.4)',
  ctaBg: '#00E5A0', ctaText: '#111111'
};

function getVals() {
  return {
    badge: document.getElementById('f_badge').value,
    label: document.getElementById('f_label').value,
    main1: document.getElementById('f_main1').value,
    main2: document.getElementById('f_main2').value,
    highlight: document.getElementById('f_highlight').value,
    sub: document.getElementById('f_sub').value,
    date: document.getElementById('f_date').value,
    cta: document.getElementById('f_cta').value
  };
}

function setVals(v) {
  document.getElementById('f_badge').value = v.badge;
  document.getElementById('f_label').value = v.label;
  document.getElementById('f_main1').value = v.main1;
  document.getElementById('f_main2').value = v.main2;
  document.getElementById('f_highlight').value = v.highlight;
  document.getElementById('f_sub').value = v.sub;
  document.getElementById('f_date').value = v.date;
  document.getElementById('f_cta').value = v.cta;
}

function draw(canvas, scale) {
  const ctx = canvas.getContext('2d');
  canvas.width = W * scale;
  canvas.height = H * scale;
  ctx.scale(scale, scale);
  const t = getVals();

  // BG gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, C.bgTop);
  bg.addColorStop(1, C.bgBottom);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(0,229,160,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i < W; i += 40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
  for (let j = 0; j < H; j += 40) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(W,j); ctx.stroke(); }

  // Glow
  const glow = ctx.createRadialGradient(W/2, H/2-30, 0, W/2, H/2-30, 350);
  glow.addColorStop(0, 'rgba(0,229,160,0.08)');
  glow.addColorStop(1, 'rgba(0,229,160,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  // Badge
  ctx.font = 'bold 18px "Noto Sans KR"';
  const bw = ctx.measureText(t.badge).width + 48;
  const bh = 38, bx = W/2, by = 135;
  ctx.beginPath();
  ctx.roundRect(bx-bw/2, by-bh/2, bw, bh, 19);
  ctx.fillStyle = C.badgeBg;
  ctx.fill();
  ctx.strokeStyle = C.badgeBorder;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = C.accent;
  ctx.fillText(t.badge, bx, by+6);

  // Label
  ctx.font = '500 22px "Noto Sans KR"';
  ctx.fillStyle = C.dim;
  ctx.fillText(t.label, W/2, 210);

  // Main line 1
  ctx.font = '900 64px "Noto Sans KR"';
  ctx.fillStyle = C.white;
  ctx.fillText(t.main1, W/2, 310);

  // Main line 2 with highlight
  if (t.highlight && t.main2.includes(t.highlight)) {
    const parts = t.main2.split(t.highlight);
    const fw = ctx.measureText(t.main2).width;
    let sx = W/2 - fw/2;
    ctx.textAlign = 'left';
    if (parts[0]) { ctx.fillStyle = C.white; ctx.fillText(parts[0], sx, 390); sx += ctx.measureText(parts[0]).width; }
    ctx.fillStyle = C.accent;
    ctx.fillText(t.highlight, sx, 390);
    sx += ctx.measureText(t.highlight).width;
    if (parts[1]) { ctx.fillStyle = C.white; ctx.fillText(parts[1], sx, 390); }
    ctx.textAlign = 'center';
  } else {
    ctx.fillStyle = C.white;
    ctx.fillText(t.main2, W/2, 390);
  }

  // Sub
  ctx.font = '400 24px "Noto Sans KR"';
  ctx.fillStyle = C.dim;
  ctx.fillText(t.sub, W/2, 450);

  // Date
  ctx.font = '500 20px "Noto Sans KR"';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText(t.date, W/2, 500);

  // CTA
  const ctaW = 280, ctaH = 56, ctaX = W/2-ctaW/2, ctaY = 570;
  ctx.shadowColor = 'rgba(0,229,160,0.3)';
  ctx.shadowBlur = 20;
  ctx.shadowOffsetY = 4;
  ctx.beginPath();
  ctx.roundRect(ctaX, ctaY, ctaW, ctaH, 28);
  ctx.fillStyle = C.ctaBg;
  ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  ctx.font = '700 22px "Noto Sans KR"';
  ctx.fillStyle = C.ctaText;
  ctx.fillText(t.cta, W/2, ctaY+36);

  // Bottom bar
  ctx.fillStyle = 'rgba(0,229,160,0.06)';
  ctx.fillRect(0, H-50, W, 50);
  ctx.font = '400 14px "Noto Sans KR"';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText('SELFISH CLUB — 이기적멤버십', W/2, H-22);
}

function render() {
  const c = document.getElementById('banner');
  draw(c, 1);
}

function download(fmt) {
  const c = document.createElement('canvas');
  draw(c, SC);
  const a = document.createElement('a');
  a.download = `kakaoplus-open-banner.${fmt}`;
  a.href = c.toDataURL(fmt === 'jpg' ? 'image/jpeg' : 'image/png', 0.95);
  a.click();
}

function toggleEdit() {
  const ed = document.getElementById('editor');
  const btn = document.querySelector('.btn-edit');
  ed.classList.toggle('hidden');
  btn.textContent = ed.classList.contains('hidden') ? '✏️ 편집 열기' : '✏️ 편집 닫기';
}

function resetAll() {
  setVals(DEFAULTS);
  render();
}

document.fonts.ready.then(() => {
  setVals(DEFAULTS);
  render();
});
</script>
</body>
</html>
